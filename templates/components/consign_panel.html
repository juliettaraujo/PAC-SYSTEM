
<div class="mt-12">

    <div class="flex items-center gap-3 mb-5">
        <div class="w-3 h-10 rounded-full bg-red-600 animate-pulse"></div>
        <div>
            <h2 class="text-2xl font-black text-red-700 uppercase tracking-wide">
                Circuitos en Consignación
            </h2>
        </div>
    </div>

    <div class="flex flex-wrap gap-5 items-start">
        {% for c in consignados %}
        <div class="bg-white border border-red-200 shadow-lg rounded-2xl p-5 w-[280px] hover:shadow-xl transition-all duration-300 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
            
            <div class="flex items-start justify-between">
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-red-500 text-lg">🔒</span>
                        <h4 class="font-black text-slate-900 text-2xl uppercase leading-none">
                            {{ c.name }}
                        </h4>
                    </div>
                    <p class="text-xs text-slate-400 font-mono mt-3 tracking-widest">
                        {{ c.nomenclature }}
                    </p>
                </div>
            </div>

            <div class="mt-5 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-[11px] font-black uppercase tracking-[2px] text-red-500">
                    Circuito en Consignación
                </span>
            </div>

            <div class="mt-6">
                <form action="/consign" method="POST">
                    <input type="hidden" name="name" value="{{ c.name }}">
                    <input type="hidden" name="nomenclature" value="{{ c.nomenclature }}">
                    <button name="action" value="liberar" class="bg-green-600 hover:bg-green-700 text-white text-xs font-black py-3 px-5 rounded-xl uppercase shadow-md transition-all duration-300 hover:scale-105"> 
                        Liberar
                    </button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
