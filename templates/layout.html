<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC control system</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<!-- HEADER CORPORATIVO -->
<header class="bg-white sticky top-0 z-50">

    <div class="max-w-[1800px] mx-auto flex items-center justify-between px-2 py-2">

        <!-- IZQUIERDA -->
        <div class="flex items-center gap-4">

            <img
                src="{{ url_for('static', filename='img/LOGO.png') }}"
                class="h-18 object-contain"
            >
        </div>

        <!-- DERECHA -->
        <div class="flex flex-col items-end">

            <!-- LOGO -->
            <img
                src="{{ url_for('static', filename='img/corpoelec.png') }}"
                class="h-18 object-contain"
            >
            <!-- MENU -->
    <div class="flex items-center gap-8 mt-3">

        <!-- MONITOR -->
<a href="/"class="nav-item {% if request.path == '/' %} active-nav {% endif %}">💻 MONITOR
</a>

<!-- CONFIG -->
<a href="/config" class="nav-item {% if request.path == '/config' %} active-nav{% endif %}">⚙ CONFIGURACIÓN
</a>

<!-- HISTORIAL -->
<a href="/history" class="nav-item {% if request.path == '/history' %} active-nav {% endif %}">🕒 HISTORIAL
</a>
    </div>

</div>
        </div>

    </div>

</header>

    <main class="page-container">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}

                <div class="mb-6 flex flex-col gap-3">

                    {% for category, message in messages %}

                        <div class="
                            px-5 py-4 rounded-2xl text-sm font-bold border shadow-sm

                            {% if category == 'success' %}
                                bg-green-50 text-green-700 border-green-200
                            {% elif category == 'error' %}
                                bg-red-50 text-red-700 border-red-200
                            {% endif %}
                        ">
                            {{ message }}
                        </div>

                    {% endfor %}

                </div>

            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}

    </main>
<script>
// 1. Para enlaces (como el botón Borrar de las tablas)
function confirmLink(event, mensaje) {
    event.preventDefault(); // Detiene la navegación instantánea
    const url = event.currentTarget.getAttribute('href');

    Swal.fire({
        title: '¿Estás seguro?',
        text: mensaje,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar',
        customClass: {
            popup: 'rounded-2xl border border-slate-100 shadow-xl',
            confirmButton: 'bg-red-600 hover:bg-red-700 text-white font-black text-xs uppercase px-4 py-2.5 rounded-xl mx-2 tracking-wider transition-all',
            cancelButton: 'bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs uppercase px-4 py-2.5 rounded-xl mx-2 tracking-wider transition-all'
        },
        buttonsStyling: false
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = url; // Redirecciona si confirma
        }
    });
}

// 2. Para formularios (como el botón de Reiniciar Sistema)
function confirmForm(event, mensaje, botonTexto = 'Sí, continuar') {
    event.preventDefault(); // Detiene el envío del formulario
    const form = event.target;

    Swal.fire({
        title: '¿Confirmar acción?',
        text: mensaje,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: botonTexto,
        cancelButtonText: 'Cancelar',
        customClass: {
            popup: 'rounded-2xl border border-slate-100 shadow-xl',
            confirmButton: 'bg-red-600 hover:bg-red-700 text-white font-black text-xs uppercase px-4 py-2.5 rounded-xl mx-2 tracking-wider transition-all',
            cancelButton: 'bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs uppercase px-4 py-2.5 rounded-xl mx-2 tracking-wider transition-all'
        },
        buttonsStyling: false
    }).then((result) => {
        if (result.isConfirmed) {
            form.submit(); // Envía el formulario si confirma
        }
    });
}
</script>
</body>
</html>
